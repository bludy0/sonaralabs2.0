  <body style="background-color:#0e0e0e">
    <!-- Tema flash önleyici: auth/landing sayfalarında CSS default (cyber-red) kalır.
         Uygulama sayfalarında localStorage'daki temayı React öncesi senkron uygular. -->
    <script>
      (function () {
        var AUTH_PATHS = ['/', '/login', '/register', '/forgot-password', '/reset-password', '/verify-email'];
        var path = window.location.pathname;
        if (AUTH_PATHS.indexOf(path) !== -1) return; // CSS default zaten cyber-red
        try {
          var raw = localStorage.getItem('sonaralabs-theme');
          if (!raw) return;
          var state = JSON.parse(raw).state;
          var themes = state.customThemes || [];
          var vars = null;
          // Önce custom tema ara
          for (var i = 0; i < themes.length; i++) {
            if (themes[i].id === state.themeId) { vars = themes[i].vars; break; }
          }
          // Yoksa preset'leri localStorage'a serialize edilmiş haliyle aramak yerine
          // sadece inline gömülü preset ID → vars eşlemesini kullan
          if (!vars) {
            var PRESETS = {"cyber-red":{"--bg-page":"#0e0e0e","--bg-card":"#131313","--bg-mid":"#191919","--bg-input":"#1f2020","--bg-border":"#262020","--bg-bright":"#2c2020","--text-1":"#ffffff","--text-2":"#b8aaaa","--text-3":"#524848","--accent":"#ff3c3c","--accent-on":"#ffffff","--accent-dim":"#3d0000","--success":"#6ec96e","--error":"#ff9977","--teal":"#64c8b4"},"cyber-yellow":{"--bg-page":"#0e0e0e","--bg-card":"#131313","--bg-mid":"#191919","--bg-input":"#1f2937","--bg-border":"#262626","--bg-bright":"#2c2c2c","--text-1":"#ffffff","--text-2":"#ababab","--text-3":"#484848","--accent":"#ffdc73","--accent-on":"#624e00","--accent-dim":"#2a2100","--success":"#6ec96e","--error":"#ff7351","--teal":"#64c8b4"},"deep-cyan":{"--bg-page":"#0e0e10","--bg-card":"#131315","--bg-mid":"#181719","--bg-input":"#201f21","--bg-border":"#2e3b3c","--bg-bright":"#2a2a2c","--text-1":"#e5e1e4","--text-2":"#b9cacb","--text-3":"#849495","--accent":"#00dbe9","--accent-on":"#002022","--accent-dim":"#003d42","--success":"#2ae500","--error":"#ffb4ab","--teal":"#7df4ff"},"crimson-night":{"--bg-page":"#0f0a0c","--bg-card":"#150d0f","--bg-mid":"#1a1012","--bg-input":"#221418","--bg-border":"#2e1a1e","--bg-bright":"#361e22","--text-1":"#f8e8ea","--text-2":"#c9a8ae","--text-3":"#7a5860","--accent":"#ff4a6a","--accent-on":"#ffffff","--accent-dim":"#3d0012","--success":"#6ec96e","--error":"#ffa09a","--teal":"#ff8fab"},"forest-dark":{"--bg-page":"#090f09","--bg-card":"#0e140e","--bg-mid":"#121a12","--bg-input":"#172017","--bg-border":"#1e3020","--bg-bright":"#233828","--text-1":"#e0f0e0","--text-2":"#a8c4a8","--text-3":"#5a7a5a","--accent":"#2ae500","--accent-on":"#002200","--accent-dim":"#0f3d00","--success":"#7df07d","--error":"#ff7351","--teal":"#64e0b4"},"violet-storm":{"--bg-page":"#0d0910","--bg-card":"#120e15","--bg-mid":"#17121c","--bg-input":"#1c1524","--bg-border":"#281d35","--bg-bright":"#30253f","--text-1":"#f0e8f5","--text-2":"#c0a8d0","--text-3":"#6a5880","--accent":"#c678dd","--accent-on":"#ffffff","--accent-dim":"#2d1040","--success":"#6ec96e","--error":"#ff7351","--teal":"#a78bdd"},"fl-studio":{"--bg-page":"#1a1a1a","--bg-card":"#222222","--bg-mid":"#282828","--bg-input":"#303030","--bg-border":"#3c3c3c","--bg-bright":"#424242","--text-1":"#e8e8e8","--text-2":"#a0a0a0","--text-3":"#606060","--accent":"#e87020","--accent-on":"#ffffff","--accent-dim":"#3d1a00","--success":"#6ec96e","--error":"#ff6060","--teal":"#60b8d0"},"solar-white":{"--bg-page":"#f4f2ed","--bg-card":"#ffffff","--bg-mid":"#ede9e2","--bg-input":"#e4dfd6","--bg-border":"#ccc7bd","--bg-bright":"#bfb9ae","--text-1":"#1a1714","--text-2":"#4a4640","--text-3":"#8a857e","--accent":"#d4880a","--accent-on":"#ffffff","--accent-dim":"#fef3dc","--success":"#267a1e","--error":"#c43000","--teal":"#1a7a6a"},"arctic-breeze":{"--bg-page":"#eef2f7","--bg-card":"#ffffff","--bg-mid":"#e4ecf4","--bg-input":"#d8e4ef","--bg-border":"#c0ceda","--bg-bright":"#b4c4d2","--text-1":"#0e1c2a","--text-2":"#3a526a","--text-3":"#6a8090","--accent":"#0072c6","--accent-on":"#ffffff","--accent-dim":"#d0e8f8","--success":"#1e7a3a","--error":"#c42800","--teal":"#0098b0"},"rose-quartz":{"--bg-page":"#faf2f4","--bg-card":"#ffffff","--bg-mid":"#f4e8ec","--bg-input":"#ecdde3","--bg-border":"#d8c4cc","--bg-bright":"#ccb4be","--text-1":"#2a1018","--text-2":"#624050","--text-3":"#9a7080","--accent":"#c0306a","--accent-on":"#ffffff","--accent-dim":"#fce4ee","--success":"#2a7a40","--error":"#b02020","--teal":"#c060a0"}};
            vars = PRESETS[state.themeId] || null;
          }
          if (!vars) return;
          var root = document.documentElement;
          for (var key in vars) { root.style.setProperty(key, vars[key]); }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

openapi: "3.0.3"
info:
  title: Sonaralabs API
  description: |
    AI-powered music generation platform for game developers.
    All requests go through the API Gateway on port 3000.
    Protected routes require a valid `access_token` cookie (set on login).
  version: "2.0.0"
  contact:
    name: Sonaralabs Team

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.sonaralabs.io
    description: Production

tags:
  - name: Auth
    description: Registration, login, token management, password reset
  - name: Generation
    description: AI music, SFX, MIDI generation and job management
  - name: Upload
    description: Audio file upload and storage management
  - name: Library
    description: Tracks, favorites, collections, project management
  - name: Credits
    description: Credit balance, usage history, packages
  - name: Notification
    description: Real-time SSE notifications
  - name: Admin
    description: Admin-only user management and analytics
  - name: Profile
    description: Public and private user profiles
  - name: Social
    description: Follow, likes, public feed, shared tracks

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  schemas:
    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:   { type: string }
        message: { type: string }

    Success:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:    { type: object }

    User:
      type: object
      properties:
        _id:           { type: string }
        email:         { type: string, format: email }
        role:          { type: string, enum: [user, admin] }
        creditBalance: { type: integer }
        storageUsed:   { type: integer }
        emailVerified: { type: boolean }
        createdAt:     { type: string, format: date-time }

    Generation:
      type: object
      properties:
        _id:         { type: string }
        userId:      { type: string }
        prompt:      { type: string }
        provider:    { type: string, enum: [stableaudio, beatoven, sonauto, elevenlabs] }
        type:        { type: string, enum: [music, sfx, midi] }
        status:      { type: string, enum: [pending, processing, done, failed] }
        audioUrl:    { type: string, format: uri }
        duration:    { type: integer, description: "seconds" }
        creditCost:  { type: integer }
        isFavorited: { type: boolean }
        jobId:       { type: string }
        createdAt:   { type: string, format: date-time }

    CreditLog:
      type: object
      properties:
        _id:          { type: string }
        amount:       { type: integer }
        type:         { type: string, enum: [earn, spend, refund] }
        reason:       { type: string }
        balanceAfter: { type: integer }
        createdAt:    { type: string, format: date-time }

    Collection:
      type: object
      properties:
        _id:       { type: string }
        name:      { type: string }
        items:     { type: array, items: { type: object } }
        createdAt: { type: string, format: date-time }

security: []

paths:
  # ── HEALTH ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Auth]
      summary: Gateway health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:  { type: string, example: ok }
                  service: { type: string, example: gateway }

  # ── AUTH ────────────────────────────────────────────────────────────────────
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      description: Creates user with 100 starter credits. Sends verification email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "201":
          description: Account created, access_token cookie set
        "409":
          description: Email already in use

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful, access_token + refresh_token cookies set
        "401":
          description: Invalid credentials

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Reads refresh_token cookie, rotates it, returns new access_token.
      responses:
        "200":
          description: New access_token issued
        "401":
          description: Refresh token invalid or expired

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out, cookies cleared

  /api/auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all devices
      security:
        - cookieAuth: []
      responses:
        "200":
          description: All sessions terminated

  /api/auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email address via token
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid or expired token

  /api/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend the email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Verification email re-sent (if account exists and unverified)

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Reset email sent (if account exists)

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:    { type: string }
                password: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password reset successful
        "400":
          description: Invalid or expired token

  /api/users/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Success"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/User" }
    delete:
      tags: [Auth]
      summary: Permanently delete current account
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account deleted

  /api/users/me/preferences:
    patch:
      tags: [Auth]
      summary: Update user preferences (theme, language, etc.)
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                accentColor: { type: string }
                language:    { type: string, enum: [en, tr] }
      responses:
        "200":
          description: Preferences updated

  /api/users/me/password:
    patch:
      tags: [Auth]
      summary: Change password
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword:     { type: string, minLength: 8 }
      responses:
        "200":
          description: Password changed
        "401":
          description: Current password incorrect


  # ── GENERATION ──────────────────────────────────────────────────────────────
  /api/generate/capabilities:
    get:
      tags: [Generation]
      summary: List available AI providers and options (public)
      responses:
        "200":
          description: Providers, durations, styles, moods

  /api/generate:
    post:
      tags: [Generation]
      summary: Generate a music loop from a text prompt
      description: |
        Queues an async generation job. Returns jobId immediately.
        Progress is streamed via SSE at /api/notify/sse.
        Active free provider: **stableaudio** (HF ZeroGPU). Credit cost scales with duration.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt, duration]
              properties:
                prompt:   { type: string, maxLength: 500 }
                provider: { type: string, enum: [stableaudio, beatoven, sonauto], default: stableaudio }
                duration: { type: integer, enum: [15, 30, 60] }
                style:    { type: string }
                mood:     { type: string }
                loop:     { type: boolean, default: false }
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:        { type: string }
                  generationId: { type: string }
                  creditCost:   { type: integer }
        "422":
          description: Insufficient credits

  /api/generate/sfx:
    post:
      tags: [Generation]
      summary: Generate a sound effect from a text prompt
      description: Powered by ElevenLabs. Credit cost = 2.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:   { type: string, maxLength: 300 }
                duration: { type: number }
      responses:
        "202":
          description: Job queued

  /api/generate/analyze-image:
    post:
      tags: [Generation]
      summary: Analyze a screenshot and generate matching music
      description: Gemini Vision reads the screenshot, then generates music. Credit cost = 1 (analysis) + music cost.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageBase64, mimeType, provider, duration]
              properties:
                imageBase64: { type: string, description: "Base64 encoded image (max 10MB)" }
                mimeType:    { type: string, enum: [image/jpeg, image/png, image/webp] }
                provider:    { type: string, enum: [stableaudio, beatoven, sonauto], default: stableaudio }
                duration:    { type: integer, enum: [15, 30, 60] }
      responses:
        "202":
          description: Analysis + generation queued

  /api/generate/midi:
    post:
      tags: [Generation]
      summary: Generate a MIDI melody (Gemini) for the DAW
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                key:    { type: string }
                bpm:    { type: integer }
      responses:
        "200":
          description: Generated MIDI note data

  /api/generate/master:
    post:
      tags: [Generation]
      summary: AI mastering suggestions (Gemini) for a DAW mix
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Mastering recommendations (EQ/compression/levels)

  /api/generate/export:
    post:
      tags: [Generation]
      summary: Convert/export audio to a target format (FFmpeg)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audioUrl, format]
              properties:
                audioUrl: { type: string, format: uri }
                format:   { type: string, enum: [wav, mp3, ogg, flac] }
      responses:
        "200":
          description: Export job result (download reference)

  /api/generate/export/file:
    post:
      tags: [Generation]
      summary: Download the exported/converted audio file
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Binary audio file
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  /api/generate/stats:
    get:
      tags: [Generation]
      summary: User dashboard statistics (aggregated)
      description: |
        Powers the user dashboard. MongoDB aggregations: totals, success/fail counts,
        provider & style distribution, daily time series, credit usage. **No hardcoded data.**
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Aggregated statistics object

  /api/generate/history:
    get:
      tags: [Generation]
      summary: List user's generation history
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, processing, done, failed] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated generation list

  /api/generate/{id}/retry:
    post:
      tags: [Generation]
      summary: Retry a failed generation at half the original credit cost
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "202":
          description: Retry queued

  /api/generate/{id}:
    delete:
      tags: [Generation]
      summary: Delete a generation record
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Generation deleted

  # ── UPLOAD ──────────────────────────────────────────────────────────────────
  /api/upload:
    post:
      tags: [Upload]
      summary: Upload an audio file
      description: |
        Allowed: WAV, MP3, OGG. Max size: 50MB. Storage quota: 500MB per user.
        Rate limit: 10 uploads/min.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: File uploaded
        "413":
          description: File too large or storage quota exceeded

  /api/upload/{id}:
    delete:
      tags: [Upload]
      summary: Delete an uploaded file
      description: Deletes from MinIO and frees storage quota.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File deleted

  # ── LIBRARY ─────────────────────────────────────────────────────────────────
  /api/library:
    get:
      tags: [Library]
      summary: Get user's combined library (generations + uploads)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [generation, upload, all] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
      responses:
        "200":
          description: Library items

  /api/library/{model}/{id}/favorite:
    patch:
      tags: [Library]
      summary: Toggle favorite on a library item
      description: Proxies to the owning service (generation or upload).
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: model
          required: true
          schema: { type: string, enum: [generation, upload] }
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Favorite toggled

  /api/library/{model}/{id}:
    delete:
      tags: [Library]
      summary: Delete a library item (generation or upload)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: model
          required: true
          schema: { type: string, enum: [generation, upload] }
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Item deleted

  /api/collections:
    get:
      tags: [Library]
      summary: List user's collections
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Collections array
    post:
      tags: [Library]
      summary: Create a new collection
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 80 }
      responses:
        "201":
          description: Collection created

  /api/collections/{id}:
    get:
      tags: [Library]
      summary: Get a collection with its items
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Collection
    patch:
      tags: [Library]
      summary: Rename a collection
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        "200":
          description: Updated
    delete:
      tags: [Library]
      summary: Delete a collection
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /api/collections/{id}/items:
    post:
      tags: [Library]
      summary: Add an item to a collection
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refId, refModel]
              properties:
                refId:    { type: string }
                refModel: { type: string, enum: [Generation, Upload] }
      responses:
        "200":
          description: Item added

  /api/collections/{id}/items/{itemId}:
    delete:
      tags: [Library]
      summary: Remove an item from a collection
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Item removed

  # ── PROJECTS (DAW) ──────────────────────────────────────────────────────────
  /api/projects:
    get:
      tags: [Library]
      summary: List saved DAW projects
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Projects list
    post:
      tags: [Library]
      summary: Save a new DAW project
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, tracks]
              properties:
                name:        { type: string }
                tracks:      { type: array }
                bpm:         { type: number }
                loopEnabled: { type: boolean }
      responses:
        "201":
          description: Project saved

  /api/projects/{id}:
    put:
      tags: [Library]
      summary: Update an existing DAW project
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project updated
    delete:
      tags: [Library]
      summary: Delete a DAW project
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /api/projects/{id}/share:
    post:
      tags: [Library]
      summary: Generate a public share link for a project
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Share token
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareToken: { type: string }

  /api/projects/share/{token}:
    get:
      tags: [Library]
      summary: Load a shared project (public, no auth)
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project data (read-only)
        "404":
          description: Share link not found

  # ── CREDITS ─────────────────────────────────────────────────────────────────
  /api/credits/balance:
    get:
      tags: [Credits]
      summary: Get current credit balance
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance: { type: integer }

  /api/credits/history:
    get:
      tags: [Credits]
      summary: Get credit transaction history
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Credit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:  { type: array, items: { $ref: "#/components/schemas/CreditLog" } }
                  total: { type: integer }

  /api/credits/packages:
    get:
      tags: [Credits]
      summary: List purchasable credit packages (public)
      responses:
        "200":
          description: Available packages

  /api/credits/purchase:
    post:
      tags: [Credits]
      summary: Purchase credits via Stripe Checkout
      description: Creates a Stripe Checkout session and returns the redirect URL.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageId]
              properties:
                packageId: { type: string }
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }

  /api/credits/webhook:
    post:
      tags: [Credits]
      summary: Stripe payment webhook
      description: |
        Receives Stripe events with the **raw request body** (signature-verified via
        `stripe-signature` header). Public — not cookie-authenticated.
      responses:
        "200":
          description: Event processed
        "400":
          description: Invalid signature

  # ── NOTIFICATION ────────────────────────────────────────────────────────────
  /api/notify/sse:
    get:
      tags: [Notification]
      summary: Subscribe to server-sent events
      description: |
        Returns a persistent SSE stream for real-time job updates.
        Events: `generation:done`, `generation:failed`, `credit:updated`.
        On reconnect, poll `/api/generate/history?status=pending` to recover pending jobs.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  # ── ADMIN ───────────────────────────────────────────────────────────────────
  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Platform-wide statistics
      description: Requires admin role. Dual-layer protection (gateway + service).
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Stats object
        "403":
          description: Admin only

  /api/admin/stats/daily:
    get:
      tags: [Admin]
      summary: Daily time series (new users / generations)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Daily aggregated series
        "403":
          description: Admin only

  /api/admin/stats/queue:
    get:
      tags: [Admin]
      summary: BullMQ queue statistics (waiting / active / failed)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Queue counters
        "403":
          description: Admin only

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users (paginated)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Users list

  /api/admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get a single user (admin)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User detail
        "403":
          description: Admin only

  /api/admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Change user role (user ↔ admin)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [user, admin] }
      responses:
        "200":
          description: Role updated

  /api/admin/generations:
    get:
      tags: [Admin]
      summary: List all generations across users
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Generations

  # ── PROFILE ─────────────────────────────────────────────────────────────────
  /api/profile/me:
    get:
      tags: [Profile]
      summary: Get current user's profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Profile
    put:
      tags: [Profile]
      summary: Update current user's profile
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                bio:         { type: string, maxLength: 300 }
                website:     { type: string, format: uri }
      responses:
        "200":
          description: Updated

  /api/profile/me/avatar:
    post:
      tags: [Profile]
      summary: Upload profile avatar
      security:
        - cookieAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar: { type: string, format: binary }
      responses:
        "200":
          description: Avatar URL returned

  /api/profile/{username}:
    get:
      tags: [Profile]
      summary: Get public profile by username (no auth)
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Public profile
        "404":
          description: User not found

  # ── SOCIAL ──────────────────────────────────────────────────────────────────
  /api/social/tracks:
    get:
      tags: [Social]
      summary: List public tracks (explore feed, no auth)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: sort
          schema: { type: string, enum: [newest, popular] }
      responses:
        "200":
          description: Public tracks
    post:
      tags: [Social]
      summary: Publish a track to the public feed
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [generationId]
              properties:
                generationId: { type: string }
                title:        { type: string }
                description:  { type: string }
      responses:
        "201":
          description: Track published

  /api/social/tracks/{id}:
    get:
      tags: [Social]
      summary: Get a specific public track
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Track
    delete:
      tags: [Social]
      summary: Remove a published track
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Track removed

  /api/social/tracks/{id}/like:
    post:
      tags: [Social]
      summary: Toggle like on a track
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Like toggled

  /api/social/follow/{userId}:
    post:
      tags: [Social]
      summary: Follow or unfollow a user
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Follow state updated

  /api/social/follow/{userId}/status:
    get:
      tags: [Social]
      summary: Check if current user follows another user
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Following status

  /api/social/followers:
    get:
      tags: [Social]
      summary: List current user's followers
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Followers list

  /api/social/following:
    get:
      tags: [Social]
      summary: List users the current user follows
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Following list

  /api/social/feed:
    get:
      tags: [Social]
      summary: Personalized feed from followed users
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Feed tracks

  /api/social/my-tracks:
    get:
      tags: [Social]
      summary: List current user's published tracks
      security:
        - cookieAuth: []
      responses:
        "200":
          description: My published tracks

  /api/social/sse:
    get:
      tags: [Social]
      summary: SSE stream for social events (likes, follows)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
